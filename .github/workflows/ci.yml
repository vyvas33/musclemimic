name: CI

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  lint:
    name: Ruff
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Set up uv
        uses: astral-sh/setup-uv@v4

      - name: Install project and developer dependencies
        run: make install-dev

      - name: Run lint
        run: make lint

  test:
    name: Pytest
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Set up uv
        uses: astral-sh/setup-uv@v4

      - name: Install headless OpenGL system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y xvfb libgl1 libglx-mesa0 libglew-dev libglfw3

      - name: Install project and developer dependencies
        run: make install-dev

      - name: Run tests
        env:
          MUJOCO_GL: glfw
        run: xvfb-run -a make test
