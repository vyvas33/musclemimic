defaults:
  - conf_fullbody_gmr  # Inherit from GMR config

# Override wandb tags
wandb:
  tags: ["fullbody", "gmr", "resnet", "baseline"]

# Enable residual network
experiment:
  actor_hidden_layers: [1408, 2688, 2688, 2688, 2688, 2688, 1408, 768, 384]
  critic_hidden_layers: [1408, 2688, 2688, 2688, 2688, 2688, 1408, 768, 384]
  auto_resume: true
  use_residual: true
  residual_type: "gated"       # "gated" (learnable sigmoid gate) or "fixed" (constant scale)
  residual_gate_init: -2.0     # Initial gate value (~0.12 after sigmoid)
  seeds: [1]
