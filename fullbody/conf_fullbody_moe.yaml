# MyoFullBody with Soft Mixture of Experts (MoE)
# Inherits from conf_fullbody.yaml and enables MoE
#
# Usage: python fullbody/experiment.py --config-name=conf_fullbody_moe
defaults:
  - conf_fullbody
  - _self_

wandb:
  tags: ["fullbody", "moe"]

experiment:
  # Network architecture (for reference)
  actor_hidden_layers: [1024, 1024, 1024, 1024, 1024]
  critic_hidden_layers: [1024, 1024, 1024, 1024, 1024]

  # Enable MoE
  use_moe: true
  moe_config:
    num_experts: 16
    moe_at_layers: [3]
    apply_moe_to: "both"
    apply_moe_to_output: false
    expert_hidden_ratio: 0.5
    temperature: 0.5
    load_balance_loss_weight: 0.01
    gate_init_std: 0.01
